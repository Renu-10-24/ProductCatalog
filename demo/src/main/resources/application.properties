spring.application.name=productCatalog
#productService.type=fakeStoreProductService
logging.level.org.springframework.web.servlet.mvc.method.annotation.ExceptionHandlerExceptionResolver=DEBUG
##
app.service.name=service-name
app.service.port=80
app.service.timeout-ms=3600

spring.docker.compose.file=./compose.yaml
spring.docker.compose.lifecycle-management=start-only


# -----------------------------
# Basic logging levels
# -----------------------------
logging.level.root=INFO
logging.level.dev.ren.productCatalog=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.http.converter.json=DEBUG
logging.level.org.springframework.web.filter.CommonsRequestLoggingFilter=DEBUG

# Helpful while debugging request binding / 400 errors
server.error.include-message=always
server.error.include-binding-errors=always

# -----------------------------
# Console pattern with trace/span placeholders
# These stay blank until tracing is enabled
# -----------------------------

#Update the console pattern to show correlation ID
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] [corr:%X{correlationId:-}] [trace:%X{traceId:-}] [span:%X{spanId:-}] %logger{36} - %msg%n
# -----------------------------
# Actuator exposure
# -----------------------------
management.endpoints.web.exposure.include=health,info,metrics,prometheus,env,loggers,conditions
management.endpoint.health.show-details=always

# -----------------------------
# Micrometer Tracing
# -----------------------------
management.tracing.enabled=true
management.tracing.sampling.probability=1.0

# OTLP trace export Jaeger
management.otlp.tracing.endpoint=http://localhost:4318/v1/traces

# Optional: OTLP metrics later, if you want them too
# management.otlp.metrics.export.url=http://localhost:4318/v1/metrics


## FakeStore config
fakestore.api.url=https://fakestoreapi.com
fakestore.api.paths.product=/products

## to disable showing stack traces in responses
spring.web.error.include-stacktrace=never

##mysql
#checks if variable MYSQL_HOST is present in the env var, if not localhost is used by default

spring.jpa.hibernate.ddl-auto=create
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3306/mydatabase
spring.datasource.username=myuser
spring.datasource.password=secret
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql: true
spring.jpa.properties.hibernate.format_sql=true

# 2. Enable Hibernate Statistics (This gives you the 'Time' taken)
spring.jpa.properties.hibernate.generate_statistics=true
#logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.stat=DEBUG

# 3. Log the actual parameter values (to run EXPLAIN manually)
logging.level.org.hibernate.orm.jdbc.bind=TRACE
# Show the transaction boundaries
logging.level.org.springframework.orm.jpa=DEBUG
